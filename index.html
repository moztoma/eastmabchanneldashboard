<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EastMabBio 渠道合作进度看板</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#f6f7f9;color:#17212b}header{padding:24px 28px;background:#fff;border-bottom:1px solid #dce2e8}.sub{color:#5b6875;line-height:1.55}.bar{display:flex;gap:10px;flex-wrap:wrap;padding:12px 28px;background:#fff;border-bottom:1px solid #dce2e8}input,select{height:36px;border:1px solid #c8d0d8;border-radius:6px;padding:0 10px}input{min-width:280px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 28px}.kpi{background:#fff;border:1px solid #dce2e8;border-radius:8px;padding:12px}.kpi span{display:block;color:#637282;font-size:12px}.kpi b{font-size:24px}.board{display:grid;grid-template-columns:repeat(9,minmax(230px,1fr));gap:14px;padding:0 28px 28px;overflow-x:auto}.col{min-width:230px;background:#edf1f5;border:1px solid #d7dee6;border-radius:8px;padding:10px}.col h2{display:flex;justify-content:space-between;margin:0 0 10px;font-size:14px}.card{background:#fff;border:1px solid #d8e0e8;border-left:4px solid #7d8ea1;border-radius:8px;padding:10px;margin-bottom:10px}.pa,.pap{border-left-color:#176f64}.pam{border-left-color:#2f7fb8}.pb{border-left-color:#b77820}.head{display:flex;justify-content:space-between;gap:8px}a{color:#16202a;text-decoration:none;font-weight:760}.score{background:#263646;color:#fff;border-radius:5px;padding:3px 6px;font-size:12px}.badges{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}.badge{border-radius:5px;padding:3px 6px;font-size:11px;background:#eef3f7;color:#415062}.country{background:#eaf0ff;color:#2f528f}.sales{background:#edf7f1;color:#2d6046}.urgent{background:#fdebd7;color:#8d4c0f}.meta{border-top:1px solid #eef1f4;margin-top:8px;padding-top:8px;color:#4d5b69;font-size:12px;line-height:1.45}footer{padding:0 28px 26px;color:#687787;font-size:12px}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:repeat(9,250px)}}</style></head><body><header><h1>EastMabBio 渠道合作进度看板</h1><p class="sub">公开脱敏只读版：不包含联系人邮箱、折扣、内部备注、邮件证据、报价或敏感商业信息。更新时间：2026-06-08。</p></header><section class="bar"><input id="q" type="search" placeholder="搜索公司、国家、区域或渠道类型"><select id="stage"></select><select id="sales"></select></section><section class="kpis"><div class="kpi"><span>公司总数</span><b id="kt"></b></div><div class="kpi"><span>A级机会</span><b id="ka"></b></div><div class="kpi"><span>需要推进</span><b id="ku"></b></div><div class="kpi"><span>推进中项目</span><b id="kp"></b></div></section><main id="board" class="board"></main><footer>公开页面仅用于团队浏览；内部完整进度以私有本地看板为准。</footer><script>const rows=[['OriGene','https://www.origene.com/','Meeting Scheduled','A+','United States','North America; EU other','OEM/catalog company','Monitor'],['antibodies-online','https://www.antibodies-online.com/contact/','Meeting Scheduled','A','Germany','DACH','Online catalog/platform','Due Soon'],['Quartzy','https://www.quartzy.com/become-supplier','Waiting Reply','A','United States','North America','Lab procurement platform','Monitor'],['Calibre Scientific','https://www.calibrescientific.com/','Waiting Reply','A-','United States','North America; EU other','Strategic life science group','Monitor'],['BIOZOL','https://www.biozol.de/de','Waiting Reply','A-','Germany','DACH','European distributor','Due Soon'],['Aurogene','https://www.aurogene.eu/','Action Now','B+','Italy','Italy','European distributor','Action Now'],['ARP American Research Products','https://www.arp1.com/contact-us/','Action Now','B','United States','North America','US reagent distributor','Action Now'],['Abyntek','https://www.abyntek.com/?lang=en','Agreement Review','B','Spain','Spain / Iberia','Spain/European distributor','Action Now'],['Dana Bioscience','https://danabiosci.com/pages/about-us','Meeting Scheduled','C','United States','North America','Small US catalog distributor','Due Soon'],['Alkali Scientific','https://alkalisci.com/contact-us/','Waiting Reply','C-','United States','North America','Lab supplies/catalog','Monitor'],['2B Scientific','https://www.2bscientific.com/','Partner Onboarding','A+','United Kingdom','UK & Ireland','European distributor','Due Soon'],['Bio-Connect','https://www.bio-connect.nl/','Partner Onboarding','A','Netherlands','France & Benelux','European distributor','Action Now'],['Lubio Science','https://www.lubio.ch/','Nurture / Lost','B+','Switzerland','DACH','European distributor','Due Soon'],['Europa Biosite','https://www.europabiosite.com/','Nurture / Lost','C','Europe','EU other','European distributor group','Monitor'],['Euroclone','https://www.euroclone.it/','Waiting Reply','B','Italy','Italy','European distributor','Due Soon'],['Fisher EU','https://www.fishersci.eu/','Waiting Reply','A','Europe','EU other','Strategic distributor/platform','Monitor'],['Fisher USA','https://www.fishersci.com/','Waiting Reply','B+','United States','North America','Strategic distributor/platform','Due Soon'],['VWR','https://www.vwr.com/','Nurture / Lost','C','United States','North America; EU other','Strategic distributor/platform','Monitor'],['Labscoop','https://www.labscoop.com/','Agreement Review','A-','United States','North America','US marketplace / fulfillment platform','Due Soon'],['Cliniscience','https://www.clinisciences.com/','Materials / Review','B','France','France & Benelux','European distributor','Monitor'],['Advion Interchim','https://www.advion-interchim.com/','Nurture / Lost','C+','France','France & Benelux','European distributor','Monitor'],['Zageno','https://www.zageno.com/','Agreement Review','A','United States','North America; EU other','Life science procurement marketplace','Due Soon'],['Diagomics','https://www.diagomics.com/en/contact-us','Waiting Reply','B','France','France & Benelux','IVD/oncology reagent distributor','Action Now'],['tebu-bio','https://www.tebu-bio.com/','Action Now','A-','France','France & Benelux','European distributor group','Action Now'],['Nova Analítica','https://www.analiticaweb.com.br/','Waiting Reply','C+','Brazil','LATAM / hold','Brazil/LATAM life science distributor','Due Soon'],['Scientist.com','https://scientist.com/','Active Partner','A','United States','North America; EU other','R&D procurement marketplace','Monitor'],['Labclinics','','Materials / Review','B','待确认','','Channel target','Monitor']].map(x=>({company:x[0],site:x[1],stage:x[2],priority:x[3],country:x[4],sales:x[5],channel:x[6],urgency:x[7]}));const stages=['Action Now','To Contact','Waiting Reply','Materials / Review','Meeting Scheduled','Agreement Review','Partner Onboarding','Active Partner','Nurture / Lost'],labels={'Action Now':'立即处理','To Contact':'待联系','Waiting Reply':'等待回复','Materials / Review':'材料/评估','Meeting Scheduled':'已安排会议','Agreement Review':'协议审核','Partner Onboarding':'合作方入驻','Active Partner':'活跃合作方','Nurture / Lost':'暂缓/丢失'},urg={'Overdue':'已逾期','Action Now':'立即处理','Due Soon':'近期跟进','Monitor':'观察','No Date':'未设日期'};const q=document.getElementById('q'),sf=document.getElementById('stage'),sl=document.getElementById('sales'),board=document.getElementById('board');function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function pc(p){return p==='A+'?'pap':p==='A'?'pa':p==='A-'?'pam':String(p).startsWith('B')?'pb':'pc'}function fill(sel,vals,label){sel.innerHTML=`<option value="">${esc(label)}</option>`+[...new Set(vals.filter(Boolean))].sort().map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('')}function filtered(){const s=q.value.toLowerCase();return rows.filter(r=>(!s||Object.values(r).join(' ').toLowerCase().includes(s))&&(!sf.value||r.stage===sf.value)&&(!sl.value||r.sales===sl.value))}function card(r){return `<article class="card ${pc(r.priority)}"><div class="head"><a href="${esc(r.site||'#')}" target="_blank" rel="noopener noreferrer">${esc(r.company)}</a><span class="score">${esc(r.priority)}</span></div><div class="badges"><span class="badge country">${esc(r.country)}</span><span class="badge sales">${esc(r.sales||'区域待确认')}</span><span class="badge ${r.urgency==='Action Now'||r.urgency==='Overdue'?'urgent':''}">${esc(urg[r.urgency]||r.urgency)}</span></div><div class="meta"><b>渠道类型：</b>${esc(r.channel||'待确认')}</div></article>`}function render(){const data=filtered();kt.textContent=data.length;ka.textContent=data.filter(r=>r.priority.startsWith('A')).length;ku.textContent=data.filter(r=>['Overdue','Action Now'].includes(r.urgency)).length;kp.textContent=data.filter(r=>['Meeting Scheduled','Agreement Review','Partner Onboarding','Active Partner'].includes(r.stage)).length;const show=sf.value?[sf.value]:stages;board.innerHTML=show.map(st=>{const items=data.filter(r=>r.stage===st).sort((a,b)=>a.company.localeCompare(b.company));return `<section class="col"><h2>${esc(labels[st])}<span>${items.length}</span></h2>${items.map(card).join('')||'<div class="meta">暂无项目</div>'}</section>`}).join('')}fill(sf,stages,'全部阶段');[...sf.options].forEach(o=>{if(o.value)o.textContent=labels[o.value]});fill(sl,rows.map(r=>r.sales),'全部销售区域');q.oninput=render;sf.onchange=render;sl.onchange=render;render();</script></body></html>
